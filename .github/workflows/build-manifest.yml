name: Build skills manifest

on:
  push:
    branches: [main]
    paths:
      # Any skill in any domain, plus the generator itself.
      - "**/SKILL.md"
      - "scripts/build_manifest.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate all machine catalogs
        # One run rewrites every catalog so they cannot drift apart:
        # cli/skills.json, registry.json, .gemini/skills-index.json, skills.json
        run: python3 scripts/build_manifest.py

      - name: Commit updated catalogs
        run: |
          CATALOGS="cli/skills.json registry.json .gemini/skills-index.json skills.json"
          if git diff --quiet -- $CATALOGS; then
            echo "No catalog changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $CATALOGS
          git commit -m "chore(cli): regenerate skills manifests [skip ci]"
          # Another workflow (e.g. Sync Codex Skills) may push to main between
          # our checkout and push — rebase and retry instead of failing red.
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push rejected (attempt ${attempt}); rebasing onto origin/main…"
            git pull --rebase --autostash origin main || true
          done
          echo "::error::Could not push catalogs after 5 attempts."
          exit 1
