# ============================================================================
# Enforce PR Target — Prevent PRs to wrong branches
# ============================================================================
# Branch governance:
#   feature/*, feat/* → may target dev OR main (ship-to-main allowed)
#   dev               → may target main
#   hotfix/*          → may target main (emergency fixes)
#   All other         → must target dev
# ============================================================================

name: Enforce PR Target

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-target:
    name: Validate PR target branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch targeting rules
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR #${PR_NUMBER}: ${HEAD} → ${BASE}"

          # Rule 1: Only dev, hotfix/*, feature/*, and feat/* branches may target main
          if [[ "$BASE" == "main" \
                && "$HEAD" != "dev" \
                && "$HEAD" != hotfix/* \
                && "$HEAD" != feature/* \
                && "$HEAD" != feat/* ]]; then
            echo "::error::Branch '${HEAD}' may not target 'main'."
            echo ""
            echo "Allowed paths to main: dev, hotfix/*, feature/*, feat/* → main"
            echo "Other branches should target 'dev' instead."
            exit 1
          fi

          # Rule 3: Warn if targeting a non-standard base branch
          if [[ "$BASE" != "main" && "$BASE" != "dev" ]]; then
            echo "::warning::PR targets non-standard base branch '${BASE}'."
            echo "Standard targets are 'dev' or 'main'."
          fi

          echo "Branch targeting rules passed."
