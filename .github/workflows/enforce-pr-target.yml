# ============================================================================
# Enforce PR Target — Prevent PRs to wrong branches
# ============================================================================
# Branch governance:
#   Conventional-Commit type branches (feat/, fix/, chore/, docs/, ci/, perf/,
#   refactor/, test/, build/, style/, revert/), plus feature/, hotfix/, and dev
#   → may target main (this repo ships type-branches straight to main).
#   Anything else → must target dev.
# ============================================================================

name: Enforce PR Target

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-target:
    name: Validate PR target branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch targeting rules
        env:
          BASE: ${{ github.event.pull_request.base.ref }}
          HEAD: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          echo "PR #${PR_NUMBER}: ${HEAD} → ${BASE}"

          # Rule 1: dev, feature/*, hotfix/*, and Conventional-Commit type
          # branches may target main. Everything else should go via dev.
          ALLOWED='^(dev$|feature/|hotfix/|feat/|fix/|chore/|docs/|ci/|perf/|refactor/|test/|build/|style/|revert/)'
          if [[ "$BASE" == "main" && ! "$HEAD" =~ $ALLOWED ]]; then
            echo "::error::Branch '${HEAD}' may not target 'main'."
            echo ""
            echo "Allowed to main: dev, feature/*, hotfix/*, and feat|fix|chore|docs|ci|perf|refactor|test|build|style|revert/*"
            echo "Other branches should target 'dev' instead."
            exit 1
          fi

          # Rule 3: Warn if targeting a non-standard base branch
          if [[ "$BASE" != "main" && "$BASE" != "dev" ]]; then
            echo "::warning::PR targets non-standard base branch '${BASE}'."
            echo "Standard targets are 'dev' or 'main'."
          fi

          echo "Branch targeting rules passed."
